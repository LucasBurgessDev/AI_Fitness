<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cycling Coach AI – Sign In</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #1a73e8 0%, #0d47a1 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
      padding: 2.5rem 2rem;
      max-width: 380px;
      width: 100%;
      text-align: center;
    }
    .icon { font-size: 3rem; margin-bottom: 0.75rem; }
    h1 { font-size: 1.5rem; color: #1a1a1a; margin-bottom: 0.4rem; }
    p { color: #555; font-size: 0.95rem; line-height: 1.5; margin-bottom: 1.75rem; }
    .btn-google {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      background: #1a73e8;
      color: #fff;
      text-decoration: none;
      padding: 0.75rem 1.5rem;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: 500;
      transition: background 0.2s;
    }
    .btn-google:hover { background: #1558b0; }
    .btn-google svg { width: 20px; height: 20px; flex-shrink: 0; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🚴</div>
    <h1>Cycling Coach AI</h1>
    <p>Your personal data-driven cycling coach. Sign in with the Google account that owns your Garmin data.</p>
    <a class="btn-google" href="/auth/start">
      <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
        <path fill="#fff" d="M44.5 20H24v8.5h11.8C34.7 33.9 30.1 37 24 37c-7.2 0-13-5.8-13-13s5.8-13 13-13c3.1 0 5.9 1.1 8.1 2.9l6.4-6.4C34.6 4.1 29.6 2 24 2 11.8 2 2 11.8 2 24s9.8 22 22 22c11 0 21-8 21-22 0-1.3-.2-2.7-.5-4z"/>
      </svg>
      Sign in with Google
    </a>
  </div>
</body>
</html>
