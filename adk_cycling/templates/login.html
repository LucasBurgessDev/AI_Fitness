<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in · Health Coach</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script>(function() { document.documentElement.setAttribute('data-theme', localStorage.getItem('cc-theme') || 'dark'); })();</script>
  <style>
    :root {
      --ground: #080D14; --surface: #111825; --surface-2: #1A2233;
      --text: #E8EDF5; --text-muted: #6B7A99;
      --accent: #00C8FF; --border: rgba(255,255,255,0.07);
      --accent-bg: rgba(0,200,255,0.08);
    }
    [data-theme="light"] {
      --ground: #F2F5F9; --surface: #FFFFFF; --surface-2: #F0F4F8;
      --text: #111825; --text-muted: #6B7A99;
      --accent: #007FA8; --border: rgba(0,0,0,0.08);
      --accent-bg: rgba(0,127,168,0.07);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--ground); color: var(--text);
      display: flex; align-items: center; justify-content: center;
      padding: 1.5rem; transition: background 0.2s, color 0.2s;
    }

    .login-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; padding: 2.5rem 2rem;
      max-width: 380px; width: 100%; text-align: center;
      box-shadow: 0 8px 40px rgba(0,0,0,0.35);
    }

    .brand-pill {
      width: 56px; height: 56px; border-radius: 16px; margin: 0 auto 1.1rem;
      background: linear-gradient(135deg, var(--accent), #9B6DFF);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.75rem;
    }

    h1 { font-size: 1.35rem; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 0.4rem; }
    .subtitle { font-size: 0.88rem; color: var(--text-muted); margin-bottom: 2rem; line-height: 1.5; }

    .signin-btn {
      display: flex; align-items: center; justify-content: center; gap: 0.65rem;
      width: 100%; padding: 0.8rem 1.5rem;
      background: var(--accent); color: var(--ground);
      border: none; border-radius: 12px;
      font-size: 0.95rem; font-weight: 600; font-family: inherit;
      cursor: pointer; text-decoration: none;
      transition: opacity 0.15s, transform 0.1s;
      box-shadow: 0 4px 16px rgba(0,200,255,0.2);
    }
    .signin-btn:hover { opacity: 0.88; transform: translateY(-1px); }
    .signin-btn:active { transform: translateY(0); }

    .google-g {
      width: 20px; height: 20px; flex-shrink: 0;
    }

    .footer-note { font-size: 0.75rem; color: var(--text-muted); margin-top: 1.5rem; line-height: 1.5; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="brand-pill">🏃</div>
    <h1>Health Coach</h1>
    <p class="subtitle">Your personal AI wellness coach — powered by your live Garmin data.</p>

    <a class="signin-btn" href="/auth/start">
      <svg class="google-g" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="currentColor" opacity="0.9"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="currentColor" opacity="0.9"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="currentColor" opacity="0.9"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="currentColor" opacity="0.9"/>
      </svg>
      Sign in with Google
    </a>

    <p class="footer-note">Access restricted to authorised accounts only.</p>
  </div>
</body>
</html>
