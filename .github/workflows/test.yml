name: Smoke Test

on:
  pull_request:
    branches:
      - main
      - dev

jobs:
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ADK dependencies
        run: pip install -r adk_cycling/requirements.txt

      - name: Compile-check ADK service
        run: |
          python -m py_compile adk_cycling/app.py
          python -m py_compile adk_cycling/agent.py
          python -m py_compile adk_cycling/profile.py
          python -m py_compile adk_cycling/bq_cache.py

      - name: Compile-check pipeline
        run: |
          python -m py_compile pipeline/garmin_stats_daily.py
          python -m py_compile pipeline/garmin_activities_daily.py
          python -m py_compile pipeline/cloud_run_entrypoint.py
          python -m py_compile pipeline/bigquery_writer.py
          python -m py_compile pipeline/batch_control.py
