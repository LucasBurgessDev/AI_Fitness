name: Deploy Cloud Run Job + ADK Cycling Service

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: health-data-482722
  REGION: europe-west2
  AR_REPO: health-jobs
  SA_EMAIL: garmin-fitness-daily-sa@health-data-482722.iam.gserviceaccount.com
  BUCKET: garmin-fitness-health-data-482722
  DRIVE_FOLDER_ID: 1hTPk71hZmqLk8RNPggjZOfIRY9Ax1op-

jobs:
  # -----------------------------------------------------------------------
  # Job 0: Detect which paths changed so we can skip unchanged services
  # -----------------------------------------------------------------------
  detect-changes:
    name: Detect Changed Paths
    runs-on: ubuntu-latest
    outputs:
      terraform: ${{ steps.filter.outputs.terraform }}
      pipeline:  ${{ steps.filter.outputs.pipeline }}
      adk:       ${{ steps.filter.outputs.adk }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            terraform:
              - 'terraform/**'
            pipeline:
              - 'pipeline/**'
            adk:
              - 'adk_cycling/**'

  # -----------------------------------------------------------------------
  # Job 1: Provision infrastructure with OpenTofu (only when terraform/ changes)
  # -----------------------------------------------------------------------
  provision-infra:
    name: Provision Infrastructure (OpenTofu)
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.terraform == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.9.0"

      - name: Cache OpenTofu providers
        uses: actions/cache@v4
        with:
          path: terraform/.terraform
          key: tofu-${{ runner.os }}-${{ hashFiles('terraform/.terraform.lock.hcl') }}
          restore-keys: tofu-${{ runner.os }}-

      - name: Bootstrap state bucket
        run: |
          gcloud storage buckets create "gs://$BUCKET" \
            --location="$REGION" \
            --uniform-bucket-level-access || true

      - name: Enable Google Calendar API
        run: gcloud services enable calendar-json.googleapis.com --project "$PROJECT_ID" || true

      - name: OpenTofu Init
        run: tofu -chdir=terraform init

      - name: Import existing resources
        working-directory: terraform
        run: |
          # set +e so intermediate non-zero exits don't generate GitHub annotations.
          # All output suppressed — these are idempotent; failure = resource already managed.
          set +e
          tofu import google_storage_bucket.pipeline_bucket "$BUCKET" >/dev/null 2>&1
          tofu import "google_artifact_registry_repository.health_jobs" \
            "projects/$PROJECT_ID/locations/$REGION/repositories/health-jobs" >/dev/null 2>&1
          tofu import "google_bigquery_dataset.garmin" \
            "projects/$PROJECT_ID/datasets/garmin" >/dev/null 2>&1
          tofu import "google_bigquery_dataset.data_control" \
            "projects/$PROJECT_ID/datasets/data_control" >/dev/null 2>&1
          tofu import "google_bigquery_table.batch_control" \
            "projects/$PROJECT_ID/datasets/data_control/tables/batch_control" >/dev/null 2>&1
          tofu import "google_bigquery_table.coaching_log" \
            "projects/$PROJECT_ID/datasets/garmin/tables/coaching_log" >/dev/null 2>&1
          tofu import "google_bigquery_table.calorie_entries" \
            "projects/$PROJECT_ID/datasets/garmin/tables/calorie_entries" >/dev/null 2>&1
          tofu import "google_bigquery_table.morning_checkin" \
            "projects/$PROJECT_ID/datasets/garmin/tables/morning_checkin" >/dev/null 2>&1
          tofu import "google_bigquery_table.evening_checkin" \
            "projects/$PROJECT_ID/datasets/garmin/tables/evening_checkin" >/dev/null 2>&1
          tofu import "google_secret_manager_secret.oauth_client_id" \
            "projects/$PROJECT_ID/secrets/cycling-coach-oauth-client-id" >/dev/null 2>&1
          tofu import "google_secret_manager_secret.oauth_client_secret" \
            "projects/$PROJECT_ID/secrets/cycling-coach-oauth-client-secret" >/dev/null 2>&1
          tofu import "google_secret_manager_secret.allowed_email" \
            "projects/$PROJECT_ID/secrets/cycling-coach-allowed-email" >/dev/null 2>&1
          tofu import "google_secret_manager_secret.secret_key" \
            "projects/$PROJECT_ID/secrets/cycling-coach-secret-key" >/dev/null 2>&1
          tofu import "google_secret_manager_secret_version.secret_key" \
            "projects/$PROJECT_ID/secrets/cycling-coach-secret-key/versions/1" >/dev/null 2>&1
          tofu import "google_cloud_scheduler_job.reminders" \
            "projects/$PROJECT_ID/locations/$REGION/jobs/cycling-coach-reminders" >/dev/null 2>&1
          exit 0

      - name: OpenTofu Apply
        run: tofu -chdir=terraform apply -auto-approve

  # -----------------------------------------------------------------------
  # Job 2: Build & deploy the Garmin data pipeline (only when pipeline/ changes)
  # -----------------------------------------------------------------------
  deploy-pipeline:
    name: Deploy Garmin Pipeline
    runs-on: ubuntu-latest
    needs: [detect-changes, provision-infra]
    if: |
      always() &&
      needs.detect-changes.result == 'success' &&
      needs.detect-changes.outputs.pipeline == 'true' &&
      (needs.provision-infra.result == 'success' || needs.provision-infra.result == 'skipped')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Build pipeline image
        run: |
          gcloud builds submit pipeline/ \
            --project "$PROJECT_ID" \
            --config pipeline/cloudbuild.yaml \
            --service-account "projects/$PROJECT_ID/serviceAccounts/$SA_EMAIL" \
            --gcs-source-staging-dir="gs://$BUCKET/cloudbuild_source" \
            --gcs-log-dir="gs://$BUCKET/cloudbuild_logs"

      - name: Deploy Cloud Run Job
        run: |
          gcloud run jobs deploy garmin-fitness-daily \
            --image "$REGION-docker.pkg.dev/$PROJECT_ID/$AR_REPO/garmin-fitness-daily:latest" \
            --service-account "$SA_EMAIL" \
            --set-env-vars "TOKEN_CACHE_GCS_URI=gs://$BUCKET/garmin/token_cache.tar.gz,DRIVE_FOLDER_ID=$DRIVE_FOLDER_ID,SAVE_PATH=/tmp,LOOKBACK_DAYS=3,FTP_LOOKBACK_DAYS=60,BQ_PROJECT_ID=$PROJECT_ID" \
            --max-retries 1 \
            --task-timeout 900 \
            --memory 1Gi \
            --cpu 1 \
            --region "$REGION"

  # -----------------------------------------------------------------------
  # Job 3: Build & deploy the ADK Cycling Coach (only when adk_cycling/ changes)
  # -----------------------------------------------------------------------
  deploy-cycling-coach:
    name: Deploy ADK Cycling Coach
    runs-on: ubuntu-latest
    needs: [detect-changes, provision-infra]
    if: |
      always() &&
      needs.detect-changes.result == 'success' &&
      needs.detect-changes.outputs.adk == 'true' &&
      (needs.provision-infra.result == 'success' || needs.provision-infra.result == 'skipped')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Build ADK cycling coach image
        run: |
          gcloud builds submit adk_cycling/ \
            --project "$PROJECT_ID" \
            --config adk_cycling/cloudbuild.yaml \
            --service-account "projects/$PROJECT_ID/serviceAccounts/$SA_EMAIL" \
            --gcs-source-staging-dir="gs://$BUCKET/cloudbuild_source" \
            --gcs-log-dir="gs://$BUCKET/cloudbuild_logs"

      - name: Remove sheet-ID secret refs (converted to plain env vars)
        run: |
          gcloud run services update cycling-coach \
            --remove-secrets=MORNING_SHEET_ID,EVENING_SHEET_ID \
            --region "$REGION" || true

      - name: Deploy Cloud Run Service
        run: |
          gcloud run deploy cycling-coach \
            --image "$REGION-docker.pkg.dev/$PROJECT_ID/$AR_REPO/cycling-coach:latest" \
            --region "$REGION" \
            --service-account "$SA_EMAIL" \
            --set-env-vars "PROJECT_ID=$PROJECT_ID,DRIVE_FOLDER_ID=$DRIVE_FOLDER_ID,GCS_PROFILE_BUCKET=$BUCKET,REDIRECT_URI=https://cycling-coach-l3h3kcxbia-nw.a.run.app/auth/callback,GOOGLE_CLOUD_PROJECT=$PROJECT_ID,GOOGLE_CLOUD_LOCATION=global,GOOGLE_GENAI_USE_VERTEXAI=1,MORNING_SHEET_ID=1OPsqSwgD1K-C6R3plk1qF9XRuvvv2LJWlEKsf5kimNs,EVENING_SHEET_ID=1UzwE5TdlcijU44e7W0jHGWhusXWD42-fMWA4Ay9lZnU" \
            --set-secrets "GOOGLE_CLIENT_ID=cycling-coach-oauth-client-id:latest,GOOGLE_CLIENT_SECRET=cycling-coach-oauth-client-secret:latest,ALLOWED_EMAIL=cycling-coach-allowed-email:latest,SECRET_KEY=cycling-coach-secret-key:latest" \
            --allow-unauthenticated \
            --memory 1Gi \
            --cpu 1 \
            --timeout 3600 \
            --port 8080

      - name: Create/update reminder Cloud Scheduler job
        run: |
          # Managed by Terraform (provision-infra); this is a fallback only.
          set +e
          gcloud scheduler jobs describe cycling-coach-reminders \
            --location="$REGION" --project="$PROJECT_ID" >/dev/null 2>&1 || \
          gcloud scheduler jobs create http cycling-coach-reminders \
            --location="$REGION" \
            --project="$PROJECT_ID" \
            --schedule="*/5 * * * *" \
            --uri="https://cycling-coach-l3h3kcxbia-nw.a.run.app/api/send-reminders" \
            --http-method=POST \
            --time-zone="Europe/London" >/dev/null 2>&1
          exit 0
